services:
  db:
    image: postgres:17
    container_name: watfood_db
    environment:
      POSTGRES_DB: watfood
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres 
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: watfood-backend
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: watfood-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata: